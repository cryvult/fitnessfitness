<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kalkulator Fitness - Twój osobisty asystent w odchudzaniu i budowaniu masy.">
    <title>Fitness Kalkulator - Osiągnij swój cel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main id="app">
        <!-- Ekran startowy: Wybór celu -->
        <section id="start-screen" class="screen active">
            <div class="container glass">
                <h1 class="title">Witaj w <span>Fitness Calc</span></h1>
                <p class="subtitle">Jaki jest Twój główny cel?</p>
                <div class="goal-grid">
                    <button class="goal-card" id="goal-lose">
                        <div class="icon">🔻</div>
                        <h3>Chcę schudnąć</h3>
                        <p>Redukcja tkanki tłuszczowej i poprawa kondycji.</p>
                    </button>
                    <button class="goal-card" id="goal-gain">
                        <div class="icon">🔺</div>
                        <h3>Chcę budować masę</h3>
                        <p>Budowa mięśni i siły fizycznej.</p>
                    </button>
                </div>
            </div>
        </section>

        <!-- Ekran Formularza: Dane użytkownika -->
        <section id="form-screen" class="screen">
            <div class="container glass">
                <button class="back-btn" id="back-to-goal">← Zmień cel</button>
                <h2 class="title">Twoje dane</h2>
                <p class="subtitle">Wprowadź swoje parametry, byśmy mogli go dopasować.</p>
                
                <form id="fitness-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="age">Wiek (lata)</label>
                            <input type="number" id="age" required min="10" max="100" placeholder="np. 25">
                        </div>
                        <div class="input-group">
                            <label for="gender">Płeć</label>
                            <select id="gender" required>
                                <option value="male">Mężczyzna</option>
                                <option value="female">Kobieta</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="weight">Waga (kg)</label>
                            <input type="number" id="weight" step="0.1" required min="30" max="300" placeholder="np. 70">
                        </div>
                        <div class="input-group">
                            <label for="height">Wzrost (cm)</label>
                            <input type="number" id="height" required min="100" max="250" placeholder="np. 175">
                        </div>
                        <div class="input-group full-width">
                            <label for="activity">Poziom aktywności</label>
                            <select id="activity" required>
                                <option value="1.2">Niska (brak treningów, praca siedząca)</option>
                                <option value="1.5">Średnia (1-3 treningi w tygodniu)</option>
                                <option value="1.9">Wysoka (4-6 treningów w tygodniu, praca fizyczna)</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Oblicz plan 🚀</button>
                </form>
            </div>
        </section>

        <!-- Ekran Wyników: Plan działania -->
        <section id="results-screen" class="screen">
            <div class="container glass wide">
                <button class="back-btn" id="edit-data">← Edytuj dane</button>
                <div class="results-header">
                    <h1 class="title">Twój <span id="result-title">Plan</span></h1>
                    <div class="calories-display">
                        <div class="kcal-card">
                            <span class="label">Twoje TDEE (CPM)</span>
                            <span class="value" id="tdee-val">2500 kcal</span>
                        </div>
                        <div class="kcal-card highlight">
                            <span class="label">Cel kaloryczny</span>
                            <span class="value" id="target-kcal-val">2000 kcal</span>
                        </div>
                    </div>
                </div>

                <div class="results-tabs">
                    <button class="tab-btn active" data-tab="tab-diet">🍽️ Dieta</button>
                    <button class="tab-btn" data-tab="tab-workout">💪 Trening</button>
                    <button class="tab-btn" data-tab="tab-tips">💡 Wskazówki</button>
                </div>

                <div id="tab-diet" class="tab-content active">
                    <div class="plan-section">
                        <h3>Przykładowy jadłospis</h3>
                        <div class="meal-list" id="diet-list"></div>
                        <div class="food-checklist">
                            <h3>Co warto jeść?</h3>
                            <ul id="food-list"></ul>
                        </div>
                    </div>
                </div>

                <div id="tab-workout" class="tab-content">
                    <div class="plan-section">
                        <h3>Twój plan treningowy</h3>
                        <div class="workout-plan" id="workout-desc"></div>
                    </div>
                </div>

                <div id="tab-tips" class="tab-content">
                    <div class="plan-section">
                        <h3>Wskazówki dla Ciebie</h3>
                        <div class="tips-grid" id="tips-list"></div>
                    </div>
                </div>
            </div>
        </section>
    <script src="script.js"></script>
</body>
</html>

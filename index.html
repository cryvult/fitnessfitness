<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kalkulator Fitness - Twój osobisty asystent w odchudzaniu i budowaniu masy.">
    <title>Fitness Kalkulator - Osiągnij swój cel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <main id="app">
        <!-- Ekran startowy: Wybór celu -->
        <section id="start-screen" class="screen active">
            <div class="container glass">
                <h1 class="title">Witaj w <span>Fitness Calc</span></h1>
                <p class="subtitle">Jaki jest Twój główny cel?</p>
                <div class="goal-grid">
                    <button class="goal-card" id="goal-lose">
                        <div class="icon">🔻</div>
                        <h3>Chcę schudnąć</h3>
                        <p>Redukcja tkanki tłuszczowej i poprawa kondycji.</p>
                    </button>
                    <button class="goal-card" id="goal-gain">
                        <div class="icon">🔺</div>
                        <h3>Chcę budować masę</h3>
                        <p>Budowa mięśni i siły fizycznej.</p>
                    </button>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
